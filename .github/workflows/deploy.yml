name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_REGION: asia-northeast1
  GCP_PROJECT_ID: lms-279
  ARTIFACT_REGISTRY: asia-northeast1-docker.pkg.dev/lms-279/lms-279

jobs:
  # CI checks must pass before deployment
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-firestore-indexes:
    name: Deploy Firestore Indexes
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/1034821634012/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@lms-279.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy Firestore indexes
        run: |
          # Install firebase-tools
          npm install -g firebase-tools

          # Deploy indexes using gcloud auth (Workload Identity Federation)
          firebase deploy --only firestore:indexes --project=${{ env.GCP_PROJECT_ID }} --non-interactive

  deploy-api:
    name: Deploy API
    needs: [ci]
    # Note: Firestore indexes are deployed independently and don't block service deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/1034821634012/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@lms-279.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          docker build -f services/api/Dockerfile -t ${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }} -t ${{ env.ARTIFACT_REGISTRY }}/api:latest .
          docker push ${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/api:latest

      - name: Deploy API to Cloud Run
        run: |
          # Build env vars string
          # NODE_ENV=production は Issue #290 fail-safe (tenant-auth.ts/super-admin.ts の
          # isProductionRuntime) の二重防御として明示。K_SERVICE 自動注入が効かないデプロイ
          # 経路（ローカル再現等）でも本番判定が効くようにする。
          # SESSION_DURATION_MS=10800000 (3時間): 動画 60-80分 + テスト所要時間で
          # 2時間運用では time_limit 強制退室が頻発したため延長 (2026-05-16, 現場声対応)
          # GCS_RESOURCE_BUCKET=lms-279-resources: 講座資料 PDF (ADR-036) の保存先。
          # 動画バケットとは別に独立して IAM/lifecycle/監査を管理する。
          # 単一バケット運用 (dev project / dev Cloud Run なし)。
          # PDF object は master lesson prefix (lessons/{masterLessonId}/...) で管理し、
          # tenant 配信は Firestore メタ (pdfGcsPath) のディープコピーで分離する。
          # 2026-05-17 にバケット作成済み + default compute SA に objectAdmin (bucket scope) 付与済み。
          # DXCOLLEGE_DISPATCH_SUBJECT / DXCOLLEGE_SENDER_EMAIL: Phase 7 DXcollege 自動完了通知用
          #   (ADR-037 案 X、SendAs alias 送信)。subject = DWD JWT impersonation 対象 (実 mailbox)、
          #   sender = MIME From ヘッダ用 alias。spec §5/§8.2 で確定済みの固定値。
          # DISPATCH_OIDC_AUDIENCE: Cloud Scheduler が発行する OIDC token の audience。
          #   api Cloud Run service URL と一致させる必要があるため secret 経由 (環境ごとに異なる)。
          #   未設定なら mount スキップ (services/api/src/index.ts の isProductionGcpRuntime で
          #   fail loud → 設定漏れを起動時に検知)。
          ENV_VARS="NODE_ENV=production,DEMO_ENABLED=true,AUTH_MODE=firebase,CORS_ORIGIN=https://web-3zcica5euq-an.a.run.app,GOOGLE_WORKSPACE_ADMIN_EMAIL=system@279279.net,SESSION_DURATION_MS=10800000,GCS_RESOURCE_BUCKET=lms-279-resources,DXCOLLEGE_DISPATCH_SUBJECT=system@279279.net,DXCOLLEGE_SENDER_EMAIL=dxcollege@279279.net"
          if [ -n "${{ secrets.SUPER_ADMIN_EMAILS }}" ]; then
            ENV_VARS="${ENV_VARS},SUPER_ADMIN_EMAILS=${{ secrets.SUPER_ADMIN_EMAILS }}"
          fi
          if [ -n "${{ secrets.DISPATCH_OIDC_AUDIENCE }}" ]; then
            ENV_VARS="${ENV_VARS},DISPATCH_OIDC_AUDIENCE=${{ secrets.DISPATCH_OIDC_AUDIENCE }}"
          fi
          gcloud run deploy api \
            --image=${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="${ENV_VARS}"

  deploy-web:
    name: Deploy Web
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/1034821634012/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@lms-279.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Web image
        run: |
          docker build -f web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=https://api-3zcica5euq-an.a.run.app \
            --build-arg NEXT_PUBLIC_AUTH_MODE=firebase \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/web:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/web:latest \
            .
          docker push ${{ env.ARTIFACT_REGISTRY }}/web:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/web:latest

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy web \
            --image=${{ env.ARTIFACT_REGISTRY }}/web:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated

  deploy-notification:
    name: Deploy Notification
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/1034821634012/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@lms-279.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Notification image
        working-directory: services/notification
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY }}/notification:${{ github.sha }} -t ${{ env.ARTIFACT_REGISTRY }}/notification:latest .
          docker push ${{ env.ARTIFACT_REGISTRY }}/notification:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/notification:latest

      - name: Deploy Notification to Cloud Run
        run: |
          gcloud run deploy notification \
            --image=${{ env.ARTIFACT_REGISTRY }}/notification:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --no-allow-unauthenticated
